{% extends "base.html" %}
{% block title %}注册 - 龙芯知识库{% endblock %}
{% block content %}
<div style="max-width: 440px; margin: 60px auto;">
    <div class="card" style="padding: 40px;">
        <h2 style="text-align:center; margin-bottom:8px; color:#333;">注册账号</h2>
        <p style="text-align:center; color:#999; margin-bottom:32px; font-size:14px;">创建一个新账号开始使用知识库</p>
        <form method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autofocus placeholder="设置用户名">
            </div>
            <div class="form-group">
                <label>显示名称</label>
                <input type="text" name="display_name" placeholder="显示名称（可选）">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="至少6位">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:16px; border-radius:8px;">注 册</button>
        </form>
        <div style="text-align:center; margin-top:20px; font-size:14px; color:#666;">
            已有账号？<a href="/login" style="color:#CC0000; text-decoration:none;">立即登录 →</a>
        </div>
    </div>
</div>
{% endblock %}
